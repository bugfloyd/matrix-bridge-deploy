---
# =============================================================================
# Xray Federation Tunnel Playbook
#
# Sets up a persistent bidirectional xray tunnel between Iran and EU servers
# for Matrix federation traffic. Uses VLESS over WebSocket, routed through
# Iran's SOCKS proxy (mihomo/xray/sing-box on port 2080).
#
# Usage:
#   ./scripts/setup-tunnel.sh
#   # or directly:
#   ansible-playbook tunnel.yml
#
# Prerequisites:
#   - A SOCKS proxy running on the Iran server (e.g. mihomo on port 2080)
#   - Both servers already deployed via playbook.yml
#   - SSH access to both servers from the control machine
# =============================================================================

# --- Step 1: Download xray binary and generate UUID ---
- name: Prepare xray binary and tunnel credentials
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Download xray binary
      get_url:
        url: https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        dest: /tmp/xray-linux-64.zip
        force: false

    - name: Check if tunnel UUID exists
      stat:
        path: credentials/tunnel_vless_uuid
      register: uuid_file

    - name: Generate tunnel UUID
      shell: python3 -c "import uuid; print(uuid.uuid4())"
      register: uuid_gen
      when: not uuid_file.stat.exists

    - name: Save tunnel UUID
      copy:
        content: "{{ uuid_gen.stdout }}"
        dest: credentials/tunnel_vless_uuid
        mode: "0600"
      when: not uuid_file.stat.exists

# --- Step 2: Set up Iran (bridge) and EU (portal) ---
- name: Deploy xray federation tunnel
  hosts: all
  become: true
  roles:
    - xray-tunnel
