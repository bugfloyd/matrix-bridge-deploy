---
# =============================================================================
# Federation SSH Tunnel Playbook
#
# Sets up a persistent bidirectional SSH tunnel between Iran and EU servers
# for Matrix federation traffic.
#
# Usage:
#   ansible-playbook tunnel.yml
#   # or via the setup script:
#   ./scripts/setup-tunnel.sh
#
# Prerequisites:
#   - A SOCKS proxy running on the Iran server at 127.0.0.1:2080
#     (e.g. v2ray, xray, DNSTT — this is out of scope for this project)
#   - Both servers already deployed via playbook.yml
#   - SSH access to both servers from the control machine
# =============================================================================

# --- Step 1: Generate SSH key on Iran and deploy tunnel service ---
- name: Set up federation tunnel on Iran server
  hosts: iran
  become: true

  pre_tasks:
    - name: Configure apt proxy for package installation
      copy:
        content: |
          Acquire::http::Proxy "http://127.0.0.1:{{ apt_proxy_port }}";
          Acquire::https::Proxy "http://127.0.0.1:{{ apt_proxy_port }}";
        dest: /etc/apt/apt.conf.d/99proxy
        mode: "0644"
      when: use_proxy | default(false)

  roles:
    - tunnel

  post_tasks:
    - name: Remove apt proxy configuration
      file:
        path: /etc/apt/apt.conf.d/99proxy
        state: absent
      when: use_proxy | default(false)

# --- Step 2: Authorize the tunnel key on EU server ---
- name: Authorize tunnel SSH key on EU server
  hosts: europe
  become: true
  tasks:
    - name: Get Iran tunnel public key from hostvars
      set_fact:
        iran_tunnel_pubkey: >-
          {{ hostvars[groups['iran'][0]].tunnel_public_key }}

    - name: Ensure .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        mode: "0700"

    - name: Add tunnel public key to authorized_keys
      authorized_key:
        user: root
        key: "{{ iran_tunnel_pubkey }}"
        comment: "matrix-federation-tunnel"
        state: present
