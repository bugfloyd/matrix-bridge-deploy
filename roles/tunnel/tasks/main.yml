---
# =============================================================================
# Federation SSH Tunnel — runs on the Iran server
#
# Generates an SSH key pair, deploys a systemd service that maintains a
# persistent bidirectional SSH tunnel to the EU server through a local
# SOCKS proxy (port {{ tunnel_socks_port }}).
# =============================================================================

# --- SSH key pair (generated on Iran, public key fetched by playbook) ---

- name: Install netcat-openbsd for SOCKS proxy support
  apt:
    name: netcat-openbsd
    state: present

- name: Check if tunnel SSH key exists
  stat:
    path: "{{ tunnel_ssh_key_path }}"
  register: tunnel_key_stat

- name: Generate SSH key pair for tunnel
  command: >
    ssh-keygen -t ed25519 -f {{ tunnel_ssh_key_path }}
    -C "matrix-tunnel@{{ inventory_hostname }}" -N ""
  when: not tunnel_key_stat.stat.exists

- name: Read tunnel public key
  slurp:
    src: "{{ tunnel_ssh_key_path }}.pub"
  register: tunnel_pubkey

- name: Store public key as fact for EU server
  set_fact:
    tunnel_public_key: "{{ tunnel_pubkey.content | b64decode | trim }}"

# --- Deploy systemd service ---

- name: Deploy matrix-tunnel systemd service
  template:
    src: matrix-tunnel.service.j2
    dest: /etc/systemd/system/matrix-tunnel.service
    mode: "0644"
  register: tunnel_service

- name: Reload systemd daemon
  systemd:
    daemon_reload: true
  when: tunnel_service.changed

- name: Enable and start matrix-tunnel service
  systemd:
    name: matrix-tunnel
    enabled: true
    state: started

- name: Restart matrix-tunnel if config changed
  systemd:
    name: matrix-tunnel
    state: restarted
  when: tunnel_service.changed
